<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MASTER NET - IPTV 🚀</title>
  <link rel="icon" href="logo.png" type="image/png">
  <style>
    :root { --primary: #e60000; --secondary: #25d366; --bg: #000; --card: #111; }
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; overflow-x: hidden; }
    
    header { text-align: center; padding: 3rem 1rem; background: linear-gradient(to bottom, #300, #000); }
    section { padding: 2rem 1rem; max-width: 1100px; margin: 0 auto; }
    
    h1 { color: var(--primary); text-transform: uppercase; letter-spacing: 3px; margin: 0; }
    h2 { text-align: center; color: #fff; margin-bottom: 2rem; text-transform: uppercase; font-size: 1.4rem; letter-spacing: 2px; }

    /* Planos */
    .products { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
    .product { background: var(--card); border: 2px solid var(--primary); padding: 20px; width: 280px; border-radius: 15px; text-align: center; transition: 0.3s; }
    .product:hover { transform: translateY(-10px); box-shadow: 0 10px 30px rgba(230, 0, 0, 0.3); }
    .price { font-size: 2.2rem; font-weight: 900; color: var(--primary); margin: 15px 0; }
    
    .btn-pix { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-bottom: 8px; }
    .btn-paid { background: transparent; color: var(--secondary); border: 1px solid var(--secondary); padding: 10px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem; text-decoration: none; display: inline-block; box-sizing: border-box; }

    /* SEÇÃO FORMAS DE PAGAMENTO - AGORA VISÍVEL E GRANDE */
    .payments { background: #0a0a0a; padding: 3rem 1rem; border-radius: 15px; text-align: center; margin: 2rem auto; border: 1px solid #333; }
    .payment-icons { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; align-items: center; }
    .pay-item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .pay-item img { width: 70px; height: auto; filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); transition: 0.3s; }
    .pay-item span { font-size: 0.9rem; font-weight: bold; color: #fff; letter-spacing: 1px; }
    .pay-item:hover img { transform: scale(1.1); filter: none; }

    /* Modal PIX */
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; backdrop-filter: blur(5px); }
    #qr-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 2px solid var(--primary); padding: 25px; border-radius: 20px; z-index: 10000; text-align: center; width: 90%; max-width: 350px; }
    #qr-img { width: 220px; height: 220px; background: #fff; padding: 10px; border-radius: 10px; margin: 15px auto; display: block; }
    #pix-code { width: 100%; height: 70px; background: #000; color: #0f0; border: 1px solid #333; padding: 10px; font-size: 0.7rem; font-family: monospace; resize: none; border-radius: 8px; }

    /* Comentários */
    .comment-box { background: #0a0a0a; padding: 2rem; border-radius: 15px; border-top: 2px solid var(--primary); margin-top: 3rem; }
    #feedback-list { margin-bottom: 20px; max-height: 400px; overflow-y: auto; text-align: left; }
    .comment-item { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--primary); }
    .comment-user { font-weight: bold; color: var(--primary); font-size: 0.9rem; }

    /* Flutuantes */
    .float-wrap { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 999; }
    .float-btn { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    .wa { background: #25d366; }
    .tg { background: #0088cc; }
  </style>
</head>
<body>

<header>
  <h1>MASTER NET IPTV 🚀</h1>
</header>

<section>
  <h2>💎 Escolha seu Plano</h2>
  <div class="products">
    <div class="product">
      <b>⚡ TESTE RÁPIDO</b>
      <div class="price">R$ 0,10</div>
      <button class="btn-pix" onclick="gerarPix('0.10', 'TESTE')">PAGAR PIX</button>
      <a href="https://wa.me/5519996804873?text=Já paguei o Teste!" target="_blank" class="btn-paid">JÁ PAGUEI ✅</a>
    </div>

    <div class="product">
      <b>👑 PLANO MENSAL</b>
      <div class="price">R$ 35,00</div>
      <button class="btn-pix" onclick="gerarPix('35.00', '1_MES')">PAGAR PIX</button>
      <a href="https://wa.me/5519996804873?text=Já paguei o Mensal!" target="_blank" class="btn-paid">JÁ PAGUEI ✅</a>
    </div>

    <div class="product">
      <b>🔥 PLANO MASTER</b>
      <div class="price">R$ 100,00</div>
      <button class="btn-pix" onclick="gerarPix('100.00', '4_MESES')">PAGAR PIX</button>
      <a href="https://wa.me/5519996804873?text=Já paguei o Master!" target="_blank" class="btn-paid">JÁ PAGUEI ✅</a>
    </div>
  </div>
</section>

<section>
  <h2>💳 Formas de Pagamento Aceitas</h2>
  <div class="payments">
    <div class="payment-icons">
      <div class="pay-item">
        <img src="https://logopsa.com/wp-content/uploads/2021/11/logo-pix-png-icone-520x520.png" alt="Pix">
        <span>PIX</span>
      </div>
      <div class="pay-item">
        <img src="https://cdn-icons-png.flaticon.com/512/349/349221.png" alt="Visa">
        <span>VISA</span>
      </div>
      <div class="pay-item">
        <img src="https://cdn-icons-png.flaticon.com/512/349/349228.png" alt="Mastercard">
        <span>MASTER</span>
      </div>
      <div class="pay-item">
        <img src="https://cdn-icons-png.flaticon.com/512/174/174861.png" alt="PayPal">
        <span>PAYPAL</span>
      </div>
      <div class="pay-item">
        <img src="https://www.mercadopago.com.br/instore/assets/images/logo-mp.png" alt="MP">
        <span>MERCADO PAGO</span>
      </div>
    </div>
  </div>
</section>

<div class="overlay" onclick="closeQR()"></div>
<div id="qr-modal">
  <h3 id="modal-titulo" style="margin:0; color:var(--primary);">Pagamento PIX</h3>
  <img id="qr-img" src="" alt="QR Code">
  <textarea id="pix-code" readonly></textarea>
  <button class="btn-pix" style="background:var(--secondary); margin-top:15px;" onclick="copyPix()">COPIAR CÓDIGO</button>
  <button class="btn-pix" style="background:#444;" onclick="closeQR()">FECHAR</button>
</div>

<section>
  <div class="comment-box">
    <h2>💬 Depoimentos dos Clientes</h2>
    <div id="feedback-list"></div>
    <div id="auth-section" style="text-align:center;">
      <button class="btn-pix" style="width:auto; padding:10px 25px;" onclick="loginGoogle()">🔐 Login com Google para comentar</button>
    </div>
    <div id="comment-area" style="display:none;">
      <p>Logado como: <strong id="user-display-name"></strong></p>
      <textarea id="comment-input" style="width:100%; height:80px; background:#1a1a1a; color:#fff; border:1px solid #333; padding:10px; border-radius:8px;" placeholder="O que você achou do nosso IPTV?"></textarea>
      <button class="btn-pix" onclick="sendComment()">PUBLICAR</button>
      <button onclick="logout()" style="background:none; border:none; color:#888; cursor:pointer;">Sair</button>
    </div>
  </div>
</section>

<div class="float-wrap">
  <a href="https://t.me/SEU_USER" class="float-btn tg" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" width="30"></a>
  <a href="https://wa.me/5519996804873" class="float-btn wa" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="30"></a>
</div>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>

<script>
// --- CONFIGURAÇÃO ---
const firebaseConfig = {
  apiKey: "AIzaSyDkzu7El2JNbQA7kflKjNX8DdsAibG7uGU",
  authDomain: "site-467da.firebaseapp.com",
  databaseURL: "https://site-467da-default-rtdb.firebaseio.com",
  projectId: "site-467da",
  storageBucket: "site-467da.firebasestorage.app",
  messagingSenderId: "749496526421",
  appId: "1:749496526421:web:53d7d52bfcdc04b0be96dc"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

function loginGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(e => alert("Erro: " + e.message));
}

function logout() { auth.signOut(); }

auth.onAuthStateChanged(user => {
  document.getElementById('auth-section').style.display = user ? 'none' : 'block';
  document.getElementById('comment-area').style.display = user ? 'block' : 'none';
  if(user) document.getElementById('user-display-name').innerText = user.displayName;
});

function sendComment() {
  const text = document.getElementById('comment-input').value;
  if(text.trim() && auth.currentUser) {
    db.ref('comments').push({ name: auth.currentUser.displayName, text: text, timestamp: Date.now() });
    document.getElementById('comment-input').value = '';
  }
}

db.ref('comments').limitToLast(10).on('child_added', snap => {
  const c = snap.val();
  const div = document.createElement('div');
  div.className = 'comment-item';
  div.innerHTML = `<div class="comment-user">${c.name}</div><div>${c.text}</div>`;
  document.getElementById('feedback-list').prepend(div);
});

// PIX
function gerarPix(v, id) {
    const val = parseFloat(v).toFixed(2);
    const p = "00020126360014BR.GOV.BCB.PIX011315a458f7-cb18-4179-a454-33eeadca9dca520400005303986540"+val.length+val+"5802BR5910MASTER NET6009SAO PAULO62070503***6304";
    document.getElementById('pix-code').value = p;
    document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(p)}`;
    document.querySelector('.overlay').style.display = 'block';
    document.getElementById('qr-modal').style.display = 'block';
}
function closeQR() { document.querySelector('.overlay').style.display = 'none'; document.getElementById('qr-modal').style.display = 'none'; }
function copyPix() { document.getElementById("pix-code").select(); document.execCommand("copy"); alert("Copiado!"); }
</script>
</body>
</html>
