<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MASTER NET - IPTV 🚀</title>
  <link rel="icon" href="logo.png" type="image/png">
  <style>
    :root { --primary: #e60000; --secondary: #25d366; --bg: #000; --card: rgba(17, 17, 17, 0.8); }
    
    body { 
      margin: 0; font-family: 'Segoe UI', sans-serif; color: #fff; background: #000; overflow: hidden; 
    }

    /* --- TELA DA TV (INTRO) --- */
    #tv-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 20000;
      transition: opacity 1s ease, visibility 1s;
    }
    .power-btn {
      width: 100px; height: 100px; border-radius: 50%; background: transparent;
      border: 4px solid #333; cursor: pointer; display: flex;
      align-items: center; justify-content: center; transition: 0.3s;
    }
    .power-btn:hover { border-color: var(--primary); box-shadow: 0 0 30px var(--primary); }
    .power-btn svg { width: 50px; fill: #333; transition: 0.3s; }
    .power-btn:hover svg { fill: var(--primary); }
    .tv-text { margin-top: 20px; color: #444; letter-spacing: 2px; font-weight: bold; }
    .tv-on-flash {
      position: absolute; width: 100%; height: 2px; background: #fff;
      top: 50%; left: 0; transform: scaleX(0); z-index: 20001; display: none;
    }
    @keyframes turn-on {
      0% { transform: scaleX(0); }
      50% { transform: scaleX(1); height: 2px; }
      100% { transform: scaleX(1); height: 100%; }
    }

    /* --- CONTEÚDO DO SITE --- */
    #main-content {
      opacity: 0; min-height: 100vh; transition: opacity 1.5s ease;
      background: linear-gradient(125deg, #000000 0%, #000000 40%, #1a0000 50%, #000000 60%, #000000 100%);
      background-size: 300% 300%; animation: auroraAnimation 15s ease infinite;
    }
    @keyframes auroraAnimation {
      0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; }
    }

    header { text-align: center; padding: 4rem 1rem 2rem; }
    h1 { color: var(--primary); text-transform: uppercase; letter-spacing: 5px; font-size: 2.5rem; margin: 0; }
    section { padding: 2rem 1rem; max-width: 1100px; margin: 0 auto; }
    
    /* Notificação Toast */
    #toast {
      position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
      background: var(--secondary); color: #000; padding: 15px 25px;
      border-radius: 50px; font-weight: bold; z-index: 30000; transition: top 0.5s ease;
    }
    #toast.show { top: 20px; }

    /* Planos */
    .products { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
    .product { 
      background: var(--card); border: 2px solid var(--primary); padding: 25px; 
      width: 280px; border-radius: 20px; text-align: center; backdrop-filter: blur(10px); 
      transition: 0.3s;
    }
    .product:hover { transform: translateY(-10px); box-shadow: 0 10px 30px rgba(230, 0, 0, 0.4); }
    .price { font-size: 2.5rem; font-weight: 900; color: var(--primary); margin: 15px 0; }
    
    .btn-pix { background: var(--primary); color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; text-decoration: none; display: block; margin-bottom: 10px; }
    .btn-paid { background: transparent; color: var(--secondary); border: 1px solid var(--secondary); padding: 10px; width: 100%; border-radius: 8px; font-weight: bold; text-decoration: none; display: block; box-sizing: border-box; }
    
    .device-input { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; text-align: center; }

    /* Pagamentos e Comentários */
    .payments { background: rgba(0,0,0,0.5); padding: 2rem; border-radius: 20px; text-align: center; margin-top: 3rem; border: 1px solid #222; }
    .comment-box { background: rgba(0,0,0,0.6); padding: 2rem; border-radius: 20px; border-top: 3px solid var(--primary); margin-top: 3rem; }
    .comment-item { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 10px; position: relative; border-left: 4px solid var(--primary); text-align: left; }
    .btn-delete { position: absolute; top: 10px; right: 10px; background: #500; color: #fff; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 10px; display: none; }

    /* Modal PIX */
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; }
    #qr-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 2px solid var(--primary); padding: 25px; border-radius: 20px; z-index: 10001; text-align: center; width: 90%; max-width: 350px; }
    #qr-img { width: 220px; height: 220px; background: #fff; padding: 10px; border-radius: 10px; margin-bottom: 15px; }
    #pix-code { width: 100%; height: 60px; background: #000; color: #0f0; border: 1px solid #333; padding: 10px; font-size: 0.7rem; resize: none; border-radius: 8px; margin-bottom: 10px; }
  </style>
</head>
<body>

  <div id="toast">Copiado! Abra o banco que deseja pagar.</div>

  <div id="tv-screen">
    <div class="tv-on-flash" id="flash"></div>
    <button class="power-btn" onclick="ligarTV()">
      <svg viewBox="0 0 24 24"><path d="M16.56,5.44L15.11,6.89C16.84,7.94 18,9.83 18,12A6,6 0 0,1 12,18A6,6 0 0,1 6,12C6,9.83 7.16,7.94 8.88,6.88L7.44,5.44C5.36,6.88 4,9.28 4,12A8,8 0 0,0 12,20A8,8 0 0,0 20,12C20,9.28 18.64,6.88 16.56,5.44M13,3H11V13H13V3Z" /></svg>
    </button>
    <div class="tv-text">CLIQUE PARA LIGAR</div>
  </div>

  <div id="main-content">
    <header><h1>MASTER NET IPTV 🚀</h1></header>

    <section>
      <div class="products">
        <div class="product">
          <b>35 RS 1 MÊS</b>
          <div class="price">R$ 35,00</div>
          <button class="btn-pix" onclick="gerarPix('35.00')">PAGAR PIX</button>
          <a href="https://wa.me/5519996804873?text=Olá! Paguei o plano de 1 MÊS (35 RS). Segue o comprovante:" target="_blank" class="btn-paid">JÁ PAGUEI ✅</a>
        </div>

        <div class="product">
          <b>60 RS 2 MÊS</b>
          <div class="price">R$ 60,00</div>
          <button class="btn-pix" onclick="gerarPix('60.00')">PAGAR PIX</button>
          <a href="https://wa.me/5519996804873?text=Olá! Paguei o plano de 2 MÊS (60 RS). Segue o comprovante:" target="_blank" class="btn-paid">JÁ PAGUEI ✅</a>
        </div>

        <div class="product">
          <b>100 RS 4 MÊS</b>
          <div class="price">R$ 100,00</div>
          <button class="btn-pix" onclick="gerarPix('100.00')">PAGAR PIX</button>
          <a href="https://wa.me/5519996804873?text=Olá! Paguei o plano de 4 MÊS (100 RS). Segue o comprovante:" target="_blank" class="btn-paid">JÁ PAGUEI ✅</a>
        </div>

        <div class="product" style="border-color: var(--secondary);">
          <b style="color: var(--secondary);">TESTE GRÁTIS</b>
          <div class="price" style="color: var(--secondary);">R$ 0,00</div>
          <input type="text" id="device-name" class="device-input" placeholder="Modelo do Dispositivo">
          <button class="btn-pix" style="background: var(--secondary); margin-top: 10px;" onclick="enviarTeste()">ENVIAR DISPOSITIVO 🚀</button>
          <small style="display:block; margin-top:5px; font-size:10px; color:#888;">Insira o dispositivo que você deseja usar o app</small>
        </div>
      </div>
    </section>

    <section>
      <div class="comment-box">
        <h2>💬 Depoimentos</h2>
        <div id="feedback-list"></div>
        <div id="auth-section" style="text-align:center;">
          <button class="btn-pix" style="width:auto; padding:10px 30px;" onclick="loginGoogle()">🔐 Login com Google para comentar</button>
        </div>
        <div id="comment-area" style="display:none; text-align: center;">
          <p>Logado: <strong id="user-display-name"></strong></p>
          <textarea id="comment-input" style="width:100%; height:80px; background:#111; color:#fff; border:1px solid #333; padding:10px; border-radius:8px;" placeholder="Sua opinião..."></textarea>
          <button class="btn-pix" onclick="sendComment()" style="margin-top: 10px;">PUBLICAR</button>
          <button onclick="logout()" style="background:none; border:none; color:#888; cursor:pointer;">Sair</button>
        </div>
      </div>
    </section>
  </div>

  <div class="overlay" onclick="closeQR()"></div>
  <div id="qr-modal">
    <h3 style="margin:0; color:var(--primary); margin-bottom:15px;">Pagamento PIX</h3>
    <img id="qr-img" src="" alt="QR">
    <textarea id="pix-code" readonly></textarea>
    <button class="btn-pix" style="background:var(--secondary);" onclick="copyPix()">COPIAR CÓDIGO</button>
    <button class="btn-pix" style="background:#333;" onclick="closeQR()">FECHAR</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>

  <script>
    // --- LÓGICA DA TV ---
    function ligarTV() {
      const flash = document.getElementById('flash');
      flash.style.display = 'block';
      flash.style.animation = 'turn-on 0.6s forwards';
      setTimeout(() => {
        document.getElementById('tv-screen').style.opacity = '0';
        document.getElementById('tv-screen').style.visibility = 'hidden';
        document.getElementById('main-content').style.opacity = '1';
        document.body.style.overflow = 'auto';
      }, 600);
    }

    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
      apiKey: "AIzaSyDkzu7El2JNbQA7kflKjNX8DdsAibG7uGU",
      authDomain: "site-467da.firebaseapp.com",
      databaseURL: "https://site-467da-default-rtdb.firebaseio.com",
      projectId: "site-467da",
      storageBucket: "site-467da.firebasestorage.app",
      messagingSenderId: "749496526421",
      appId: "1:749496526421:web:53d7d52bfcdc04b0be96dc"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const admins = ["hugoalevi731@gmail.com", "milezivictor@gmail.com"];

    // --- FUNÇÕES ---
    function loginGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function logout() { auth.signOut(); }

    auth.onAuthStateChanged(user => {
      document.getElementById('auth-section').style.display = user ? 'none' : 'block';
      document.getElementById('comment-area').style.display = user ? 'block' : 'none';
      if(user) document.getElementById('user-display-name').innerText = user.displayName;
      renderComments();
    });

    function sendComment() {
      const txt = document.getElementById('comment-input').value;
      if(txt.trim() && auth.currentUser) {
        db.ref('comments').push({ name: auth.currentUser.displayName, text: txt, email: auth.currentUser.email });
        document.getElementById('comment-input').value = '';
      }
    }

    function renderComments() {
      db.ref('comments').on('value', snap => {
        const list = document.getElementById('feedback-list');
        list.innerHTML = "";
        snap.forEach(child => {
          const c = child.val();
          const isAdm = (auth.currentUser && admins.includes(auth.currentUser.email));
          const div = document.createElement('div');
          div.className = 'comment-item';
          div.innerHTML = `<div class="comment-user">${c.name}</div><div>${c.text}</div>
          <button class="btn-delete" style="display: ${isAdm ? 'block' : 'none'}" onclick="deleteComment('${child.key}')">Apagar</button>`;
          list.prepend(div);
        });
      });
    }

    function deleteComment(id) { if(confirm("Apagar?")) db.ref('comments/'+id).remove(); }

    function gerarPix(v) {
      const p = "00020126360014BR.GOV.BCB.PIX011315a458f7-cb18-4179-a454-33eeadca9dca520400005303986540"+v.length+v+"5802BR5910MASTER NET6009SAO PAULO62070503***6304";
      document.getElementById('pix-code').value = p;
      document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(p)}`;
      document.querySelector('.overlay').style.display = 'block';
      document.getElementById('qr-modal').style.display = 'block';
    }

    function copyPix() {
      const code = document.getElementById("pix-code");
      code.select(); document.execCommand("copy");
      const t = document.getElementById("toast");
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 4000);
    }

    function enviarTeste() {
      const d = document.getElementById('device-name').value;
      if(!d.trim()){ alert("Digite o modelo!"); return; }
      window.open(`https://wa.me/5519996804873?text=Quero teste grátis para meu dispositivo: ${d}`, '_blank');
    }

    function closeQR() { 
      document.querySelector('.overlay').style.display = 'none'; 
      document.getElementById('qr-modal').style.display = 'none'; 
    }
  </script>
</body>
</html>
