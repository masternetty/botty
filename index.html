<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamento - Masteri</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      background: #111827;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
      width: 300px;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 24px;
    }

    p {
      font-size: 14px;
      color: #9ca3af;
      margin-bottom: 25px;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: #00ff88;
      color: #000;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #00cc6a;
      transform: scale(1.05);
    }

    .pix {
      margin-top: 15px;
      font-size: 12px;
      color: #22c55e;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Pagamento</h1>
    <p>Clique abaixo para pagar com Pix</p>

    <button onclick="pagar()">
      💰 Pagar com Pix
    </button>

    <div class="pix">
      Pagamento seguro via Mercado Pago
    </div>
  </div>

  <script>
    function pagar() {
      window.open("https://link.mercadopago.com.br/masteri", "_blank");
    }
  </script>

</body>
</html>
