<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER NET - IPTV 🚀</title>
    <style>
        :root { --primary: #e60000; --secondary: #25d366; --bg: #000; --card: #111; }
        
        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; 
            overflow-x: hidden;
        }

        /* Moldura de TV e Intro (Mantidos conforme solicitado) */
        .tv-frame {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            border: 18px solid #222;
            border-image: linear-gradient(to bottom, #444, #111, #333) 1;
            box-shadow: inset 0 0 50px #000;
            z-index: 50000; pointer-events: none;
            box-sizing: border-box;
        }

        #tv-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 20000;
        }

        .power-btn {
            width: 100px; height: 100px; border-radius: 50%; background: transparent;
            border: 4px solid #333; cursor: pointer; display: flex;
            align-items: center; justify-content: center;
        }

        /* Estilo dos Cards de Preço */
        .products { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .product { 
            background: var(--card); border: 2px solid var(--primary); padding: 20px; 
            width: 280px; border-radius: 15px; text-align: center; 
        }
        .price { font-size: 2.2rem; font-weight: 900; color: var(--primary); margin: 15px 0; }
        
        /* Botões de Ação */
        .btn-pix { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 8px; }
        .btn-paid { background: transparent; color: var(--secondary); border: 1px solid var(--secondary); padding: 10px; width: 100%; border-radius: 8px; font-weight: bold; text-decoration: none; display: block; box-sizing: border-box; }
        
        /* Card de Teste Grátis */
        .test-card { border-color: var(--secondary); }
        .btn-test { background: var(--secondary); }

        /* Estilo da Área de Comentários */
        .comment-box { background: #0a0a0a; padding: 2rem; border-radius: 15px; border-top: 2px solid var(--primary); margin: 20px auto; max-width: 1100px; }
        #comment-input { width: 100%; height: 80px; background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 8px; box-sizing: border-box; }
        
        /* Modais */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; }
        #qr-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 2px solid var(--primary); padding: 25px; border-radius: 20px; z-index: 10000; text-align: center; width: 90%; max-width: 350px; }
    </style>
</head>
<body>

<div class="tv-frame"></div>

<div id="tv-screen">
    <button class="power-btn" onclick="ligarTV()">
        <svg viewBox="0 0 24 24" width="50" fill="var(--primary)"><path d="M16.56,5.44L15.11,6.89C16.84,7.94 18,9.83 18,12A6,6 0 0,1 12,18A6,6 0 0,1 6,12C6,9.83 7.16,7.94 8.88,6.88L7.44,5.44C5.36,6.88 4,9.28 4,12A8,8 0 0,0 12,20A8,8 0 0,0 20,12C20,9.28 18.64,6.88 16.56,5.44M13,3H11V13H13V3Z" /></svg>
    </button>
</div>

<div id="main-content" style="display:none;">
    <div class="products">
        <div class="product">
            <div class="price">R$ 35,00</div>
            <button class="btn-pix" onclick="gerarPix('35.00')">PAGAR PIX</button>
            <a href="#" class="btn-paid">JÁ PAGUEI ✅</a>
        </div>
        <div class="product">
            <div class="price">R$ 60,00</div>
            <button class="btn-pix" onclick="gerarPix('60.00')">PAGAR PIX</button>
            <a href="#" class="btn-paid">JÁ PAGUEI ✅</a>
        </div>
        <div class="product">
            <div class="price">R$ 100,00</div>
            <button class="btn-pix" onclick="gerarPix('100.00')">PAGAR PIX</button>
            <a href="#" class="btn-paid">JÁ PAGUEI ✅</a>
        </div>
        <div class="product test-card">
            <h3 style="color:var(--secondary)">TESTE GRÁTIS</h3>
            <div class="price" style="color:var(--secondary)">R$ 0,00</div>
            <button class="btn-pix btn-test">QUERO MEU TESTE</button>
            <input type="text" style="width:100%; margin-top:10px; background:#000; border:1px solid #444; color:white; padding:8px;" placeholder="tv tcl">
        </div>
    </div>

    <div class="comment-box">
        <div id="auth-section" style="text-align:center;">
            <button class="btn-pix" style="width:auto; padding:10px 20px;" onclick="loginGoogle()">🔐 Login com Google para comentar</button>
        </div>
        <div id="comment-area" style="display:none; text-align:center;">
            <textarea id="comment-input" placeholder="O que você achou do nosso IPTV?"></textarea>
            <button class="btn-pix" onclick="sendComment()" style="margin-top:10px; width:auto; padding:10px 40px;">PUBLICAR COMENTÁRIO 💬</button>
            <p><small onclick="logout()" style="cursor:pointer; color:#888;">Sair da conta</small></p>
        </div>
        <div id="feedback-list" style="margin-top:20px;"></div>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeQR()"></div>
<div id="qr-modal">
    <h3 style="color:var(--primary); margin-top:0;">Pagamento PIX</h3>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=00020126360014BR.GOV.BCB.PIX011315a458f7-cb18-4179-a454-33eeadca9dca520400005303986540" style="background:white; padding:10px; border-radius:10px;">
    <textarea id="pix-code" readonly style="width:100%; height:60px; margin-top:10px; background:#000; color:#0f0; border:1px solid #333; font-family:monospace; font-size:10px; padding:5px;">00020126360014BR.GOV.BCB.PIX011315a458f7-cb18-4179-a454-33eeadca9dca520400005303986540</textarea>
    <button class="btn-pix" style="background:var(--secondary); margin-top:10px;" onclick="copyPix()">COPIAR CÓDIGO</button>
    <button class="btn-pix" style="background:#444;" onclick="closeQR()">FECHAR</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>

<script>
    // Configurações do seu Firebase (Mantenha as suas chaves aqui)
    const firebaseConfig = {
        apiKey: "AIzaSyDkzu7El2JNbQA7kflKjNX8DdsAibG7uGU",
        authDomain: "site-467da.firebaseapp.com",
        databaseURL: "https://site-467da-default-rtdb.firebaseio.com",
        projectId: "site-467da",
        storageBucket: "site-467da.firebasestorage.app",
        appId: "1:749496526421:web:53d7d52bfcdc04b0be96dc"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    function ligarTV() {
        document.getElementById('tv-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        document.body.style.overflow = 'auto';
    }

    function loginGoogle() {
        auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    }

    function logout() { auth.signOut(); }

    auth.onAuthStateChanged(user => {
        document.getElementById('auth-section').style.display = user ? 'none' : 'block';
        document.getElementById('comment-area').style.display = user ? 'block' : 'none';
        renderComments();
    });

    // CORREÇÃO DO BOTÃO DE COMENTÁRIO
    function sendComment() {
        const text = document.getElementById('comment-input').value;
        if (text.trim() && auth.currentUser) {
            db.ref('comments').push({
                name: auth.currentUser.displayName,
                text: text,
                email: auth.currentUser.email,
                timestamp: Date.now()
            }).then(() => {
                document.getElementById('comment-input').value = "";
                alert("Comentário publicado!");
            });
        } else {
            alert("Por favor, digite um comentário.");
        }
    }

    function renderComments() {
        db.ref('comments').on('value', snap => {
            const list = document.getElementById('feedback-list');
            list.innerHTML = "";
            snap.forEach(child => {
                const c = child.val();
                const div = document.createElement('div');
                div.style.background = "#1a1a1a";
                div.style.padding = "15px";
                div.style.borderRadius = "10px";
                div.style.marginBottom = "10px";
                div.style.borderLeft = "4px solid var(--primary)";
                div.innerHTML = `<strong>${c.name}</strong><p style="margin:5px 0;">${c.text}</p>`;
                list.prepend(div);
            });
        });
    }

    // Funções do Modal
    function gerarPix(valor) {
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('qr-modal').style.display = 'block';
    }

    function closeQR() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('qr-modal').style.display = 'none';
    }

    function copyPix() {
        const code = document.getElementById("pix-code");
        code.select();
        document.execCommand("copy");
        alert("Copiado!"); // Substitui o toast para garantir funcionamento imediato
    }
</script>

</body>
</html>
