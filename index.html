<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MASTER NET - IPTV 🚀</title>
  <link rel="icon" href="logo.png" type="image/png">
  <style>
    :root { --primary: #e60000; --secondary: #25d366; --bg: #000; --card: #111; }
    
    body { 
      margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; 
      overflow: hidden; /* Trava o scroll até ligar a TV */
    }

    /* --- MOLDURA DA TV REALISTA --- */
    .tv-frame {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      border: 18px solid #222;
      border-image: linear-gradient(to bottom, #444, #111, #333) 1;
      box-shadow: inset 0 0 50px #000;
      z-index: 50000; pointer-events: none;
      box-sizing: border-box;
    }

    /* --- TELA DA TV (INTRO) --- */
    #tv-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 20000;
      transition: opacity 0.8s ease;
    }
    .power-btn {
      width: 100px; height: 100px; border-radius: 50%; background: transparent;
      border: 4px solid #333; cursor: pointer; display: flex;
      align-items: center; justify-content: center; transition: 0.3s;
    }
    .power-btn:hover { border-color: var(--primary); box-shadow: 0 0 30px var(--primary); }
    .power-btn svg { width: 50px; fill: #333; transition: 0.3s; }
    .power-btn:hover svg { fill: var(--primary); }
    .tv-text { margin-top: 20px; color: #444; letter-spacing: 2px; font-weight: bold; text-transform: uppercase; }

    /* ANIMAÇÃO DE LIGAR (EXPANDINDO VERTICAL E HORIZONTAL) */
    .tv-on-flash {
      position: absolute; width: 100%; height: 4px; background: #fff;
      top: 50%; left: 0; transform: scaleX(0); z-index: 20001; display: none;
      box-shadow: 0 0 20px #fff;
    }
    @keyframes turn-on-expand {
      0% { transform: scaleX(0) scaleY(1); }
      40% { transform: scaleX(1) scaleY(1); }
      100% { transform: scaleX(1) scaleY(500); }
    }

    /* --- CONTEÚDO PRINCIPAL --- */
    #main-content {
      opacity: 0; min-height: 100vh; transition: opacity 1.5s ease;
      background: radial-gradient(circle at center, #1a0000 0%, #000000 100%);
      padding: 40px; box-sizing: border-box;
    }
    
    header { text-align: center; padding: 3rem 1rem; }
    h1 { color: var(--primary); text-transform: uppercase; letter-spacing: 3px; margin: 0; }
    section { padding: 2rem 1rem; max-width: 1100px; margin: 0 auto; }
    h2 { text-align: center; color: #fff; margin-bottom: 2rem; text-transform: uppercase; font-size: 1.4rem; letter-spacing: 2px; }

    /* Notificação (Toast) */
    #toast {
      position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
      background: var(--secondary); color: #000; padding: 15px 25px;
      border-radius: 50px; font-weight: bold; z-index: 60000; transition: top 0.5s ease;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5); text-align: center; min-width: 300px;
    }
    #toast.show { top: 30px; }

    /* Planos */
    .products { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
    .product { background: var(--card); border: 2px solid var(--primary); padding: 20px; width: 280px; border-radius: 15px; text-align: center; transition: 0.3s; position: relative; }
    .product:hover { transform: translateY(-10px); box-shadow: 0 10px 30px rgba(230, 0, 0, 0.3); }
    .price { font-size: 2.2rem; font-weight: 900; color: var(--primary); margin: 15px 0; }
    
    .btn-pix { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-bottom: 8px; text-decoration: none; display: block; box-sizing: border-box; }
    .btn-paid { background: transparent; color: var(--secondary); border: 1px solid var(--secondary); padding: 10px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem; text-decoration: none; display: inline-block; box-sizing: border-box; }
    
    .device-input { width: 100%; padding: 10px; margin-top: 10px; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; text-align: center; }

    /* Modal PIX */
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; backdrop-filter: blur(5px); }
    #qr-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 2px solid var(--primary); padding: 25px; border-radius: 20px; z-index: 10000; text-align: center; width: 90%; max-width: 350px; }
    #qr-img { width: 220px; height: 220px; background: #fff; padding: 10px; border-radius: 10px; margin: 15px auto; display: block; }
    #pix-code { width: 100%; height: 60px; background: #000; color: #0f0; border: 1px solid #333; padding: 10px; font-size: 0.7rem; font-family: monospace; resize: none; border-radius: 8px; }

    /* Comentários */
    .comment-box { background: #0a0a0a; padding: 2rem; border-radius: 15px; border-top: 2px solid var(--primary); margin-top: 3rem; }
    .comment-item { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 10px; position: relative; border-left: 4px solid var(--primary); text-align: left; }
    .comment-user { font-weight: bold; color: var(--primary); font-size: 0.9rem; margin-bottom: 5px; }
    .btn-delete { position: absolute; top: 10px; right: 10px; background: #500; color: #fff; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 10px; display: none; }
  </style>
</head>
<body>

<div class="tv-frame"></div>
<div id="toast">Copiado! Abra o banco que deseja pagar 🏛️📲✅</div>

<div id="tv-screen">
  <div class="tv-on-flash" id="flash"></div>
  <button class="power-btn" onclick="ligarTV()">
    <svg viewBox="0 0 24 24"><path d="M16.56,5.44L15.11,6.89C16.84,7.94 18,9.83 18,12A6,6 0 0,1 12,18A6,6 0 0,1 6,12C6,9.83 7.16,7.94 8.88,6.88L7.44,5.44C5.36,6.88 4,9.28 4,12A8,8 0 0,0 12,20A8,8 0 0,0 20,12C20,9.28 18.64,6.88 16.56,5.44M13,3H11V13H13V3Z" /></svg>
  </button>
  <div class="tv-text">CLIQUE PARA LIGAR</div>
</div>

<div id="main-content">
  <header>
    <h1>MASTER NET IPTV 🚀</h1>
  </header>

  <section>
    <h2>💎 Escolha seu Plano</h2>
    <div class="products">
      <div class="product">
        <b>⚡ 35 RS 1 MÊS</b>
        <div class="price">R$ 35,00</div>
        <button class="btn-pix" onclick="gerarPix('35.00')">PAGAR PIX 💳</button>
        <a href="https://wa.me/5519996804873?text=Olá! Paguei o plano de 1 MÊS (35 RS). Segue o comprovante:" target="_blank" class="btn-paid">JÁ PAGUEI ✅</a>
      </div>

      <div class="product">
        <b>👑 60 RS 2 MÊS</b>
        <div class="price">R$ 60,00</div>
        <button class="btn-pix" onclick="gerarPix('60.00')">PAGAR PIX 💳</button>
        <a href="https://wa.me/5519996804873?text=Olá! Paguei o plano de 2 MÊS (60 RS). Segue o comprovante:" target="_blank" class="btn-paid">JÁ PAGUEI ✅</a>
      </div>

      <div class="product">
        <b>🔥 100 RS 4 MÊS</b>
        <div class="price">R$ 100,00</div>
        <button class="btn-pix" onclick="gerarPix('100.00')">PAGAR PIX 💳</button>
        <a href="https://wa.me/5519996804873?text=Olá! Paguei o plano de 4 MÊS (100 RS). Segue o comprovante:" target="_blank" class="btn-paid">JÁ PAGUEI ✅</a>
      </div>

      <div class="product" style="border-color: var(--secondary);">
        <b style="color: var(--secondary);">🎁 TESTE GRÁTIS</b>
        <div class="price" style="color: var(--secondary);">R$ 0,00</div>
        <input type="text" id="device-name" class="device-input" placeholder="Modelo do Dispositivo">
        <button class="btn-pix" style="background: var(--secondary); margin-top: 10px;" onclick="enviarTeste()">SOLICITAR TESTE 🚀</button>
      </div>
    </div>
  </section>

  <section>
    <div class="comment-box">
      <h2>💬 Depoimentos dos Clientes</h2>
      <div id="feedback-list"></div>
      <div id="auth-section" style="text-align:center;">
        <button class="btn-pix" style="width:auto; padding:12px 30px;" onclick="loginGoogle()">🔐 Login com Google para comentar</button>
      </div>
      <div id="comment-area" style="display:none; text-align: center;">
        <p>Logado como: <strong id="user-display-name"></strong></p>
        <textarea id="comment-input" style="width:100%; height:80px; background:#1a1a1a; color:#fff; border:1px solid #333; padding:10px; border-radius:8px;" placeholder="O que você achou?"></textarea>
        <button class="btn-pix" onclick="sendComment()" style="margin-top: 10px;">PUBLICAR</button>
      </div>
    </div>
  </section>
</div>

<div class="overlay" onclick="closeQR()"></div>
<div id="qr-modal">
  <h3 style="margin:0; color:var(--primary);">Pagamento PIX</h3>
  <img id="qr-img" src="" alt="QR Code">
  <textarea id="pix-code" readonly></textarea>
  <button class="btn-pix" style="background:var(--secondary); margin-top:15px;" onclick="copyPix()">COPIAR CÓDIGO</button>
  <button class="btn-pix" style="background:#444;" onclick="closeQR()">FECHAR</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>

<script>
// CONFIGURAÇÃO FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDkzu7El2JNbQA7kflKjNX8DdsAibG7uGU",
  authDomain: "site-467da.firebaseapp.com",
  databaseURL: "https://site-467da-default-rtdb.firebaseio.com",
  projectId: "site-467da",
  storageBucket: "site-467da.firebasestorage.app",
  messagingSenderId: "749496526421",
  appId: "1:749496526421:web:53d7d52bfcdc04b0be96dc"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();
const admins = ["hugoalevi731@gmail.com", "milezivictor@gmail.com"];

// LIGAR TV
function ligarTV() {
  const flash = document.getElementById('flash');
  flash.style.display = 'block';
  flash.style.animation = 'turn-on-expand 0.7s forwards';
  setTimeout(() => {
    document.getElementById('tv-screen').style.opacity = '0';
    setTimeout(() => {
      document.getElementById('tv-screen').style.display = 'none';
      document.getElementById('main-content').style.opacity = '1';
      document.body.style.overflow = 'auto';
    }, 500);
  }, 700);
}

// RESTANTE DAS FUNÇÕES (LOGIN, COMENTÁRIOS, PIX)
function loginGoogle() {
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
}

auth.onAuthStateChanged(user => {
  document.getElementById('auth-section').style.display = user ? 'none' : 'block';
  document.getElementById('comment-area').style.display = user ? 'block' : 'none';
  if(user) document.getElementById('user-display-name').innerText = user.displayName;
  renderComments();
});

function sendComment() {
  const text = document.getElementById('comment-input').value;
  if(text.trim() && auth.currentUser) {
    db.ref('comments').push({ name: auth.currentUser.displayName, text: text, email: auth.currentUser.email });
    document.getElementById('comment-input').value = '';
  }
}

function renderComments() {
  db.ref('comments').on('value', snap => {
    const list = document.getElementById('feedback-list');
    list.innerHTML = "";
    snap.forEach(child => {
      const c = child.val();
      const id = child.key;
      const isAdm = (auth.currentUser && admins.includes(auth.currentUser.email));
      const div = document.createElement('div');
      div.className = 'comment-item';
      div.innerHTML = `
        <div class="comment-user">${c.name}</div>
        <div>${c.text}</div>
        <button class="btn-delete" style="display: ${isAdm ? 'block' : 'none'}" onclick="deleteComment('${id}')">Apagar</button>
      `;
      list.prepend(div);
    });
  });
}

function gerarPix(v) {
    const p = "00020126360014BR.GOV.BCB.PIX011315a458f7-cb18-4179-a454-33eeadca9dca520400005303986540"+v.length+v+"5802BR5910MASTER NET6009SAO PAULO62070503***6304";
    document.getElementById('pix-code').value = p;
    document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(p)}`;
    document.querySelector('.overlay').style.display = 'block';
    document.getElementById('qr-modal').style.display = 'block';
}

function copyPix() {
  const code = document.getElementById("pix-code");
  code.select();
  document.execCommand("copy");
  const toast = document.getElementById("toast");
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 4000);
}

function enviarTeste() {
    const d = document.getElementById('device-name').value;
    if (!d.trim()) { alert("Digite o seu dispositivo!"); return; }
    window.open(`https://wa.me/5519996804873?text=Olá! Quero meu teste grátis para meu dispositivo: ${d}`, '_blank');
}

function closeQR() { 
  document.querySelector('.overlay').style.display = 'none'; 
  document.getElementById('qr-modal').style.display = 'none'; 
}
</script>
</body>
</html>
