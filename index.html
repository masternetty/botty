<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MASTER NET - IPTV 🚀</title>
  <link rel="icon" href="logo.png" type="image/png">
  <style>
    :root { --primary: #e60000; --secondary: #25d366; --bg: #000; --card: #111; }
    
    body { 
      margin: 0; font-family: 'Segoe UI', sans-serif; 
      background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('fundo.jpg'); 
      background-size: cover; background-position: center; background-attachment: fixed;
      background-color: var(--bg); color: #fff; overflow: hidden; 
    }

    /* --- MOLDURA DA TV --- */
    .tv-frame {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      border: 18px solid #222; border-image: linear-gradient(to bottom, #444, #111, #333) 1;
      box-shadow: inset 0 0 50px #000; z-index: 50000; pointer-events: none; box-sizing: border-box;
    }

    /* --- ANIMAÇÃO DA LUZ SUBINDO --- */
    .tv-on-flash {
      position: fixed; width: 100%; height: 100%; background: #fff;
      top: 0; left: 0; z-index: 20001; display: none;
      clip-path: inset(50% 0 50% 0);
    }
    @keyframes turn-on {
      0% { clip-path: inset(50% 0 50% 0); }
      40% { clip-path: inset(49.8% 0 49.8% 0); }
      100% { clip-path: inset(0 0 0 0); }
    }

    /* --- TELA DA TV --- */
    #tv-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 20000;
      transition: opacity 0.5s;
    }
    .power-btn {
      width: 100px; height: 100px; border-radius: 50%; background: transparent;
      border: 4px solid #333; cursor: pointer; display: flex;
      align-items: center; justify-content: center; transition: 0.3s;
    }
    .power-btn:hover { border-color: var(--primary); box-shadow: 0 0 30px var(--primary); }
    .power-btn svg { width: 50px; fill: #333; transition: 0.3s; }

    /* --- CONTEÚDO --- */
    #main-content { opacity: 0; transition: opacity 1s ease; padding: 20px; padding-top: 60px; }
    header { text-align: center; padding: 1rem; }
    h1 { color: var(--primary); text-transform: uppercase; letter-spacing: 3px; margin: 0; font-size: 2rem; }

    /* --- SEÇÃO STREAMINGS (NOVO) --- */
    .streaming-container {
      display: flex; flex-wrap: wrap; justify-content: center; align-items: center;
      gap: 30px; margin: 30px auto; max-width: 1000px;
      padding: 20px; background: rgba(255,255,255,0.05); border-radius: 20px;
      backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1);
    }
    .streaming-container img {
      height: 40px; width: auto; filter: grayscale(20%) brightness(1.2);
      transition: 0.3s;
    }
    .streaming-container img:hover { filter: grayscale(0%) scale(1.1); }

    /* Planos */
    .products { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
    .product { background: rgba(17, 17, 17, 0.9); border: 2px solid var(--primary); padding: 20px; width: 280px; border-radius: 15px; text-align: center; backdrop-filter: blur(5px); position: relative; overflow: hidden; }
    .price { font-size: 2.2rem; font-weight: 900; color: var(--primary); margin: 15px 0; }
    
    .btn-pix { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 8px; display: block; text-decoration: none; box-sizing: border-box; }
    .btn-paid { background: transparent; color: var(--secondary); border: 1px solid var(--secondary); padding: 10px; width: 100%; border-radius: 8px; font-weight: bold; text-decoration: none; display: inline-block; box-sizing: border-box; }

    /* Teste Grátis */
    .test-card { border-color: var(--secondary); }
    .device-input { width: 100%; padding: 10px; margin-top: 10px; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; text-align: center; box-sizing: border-box;}

    /* Pagamentos */
    .payments { background: rgba(10, 10, 10, 0.8); padding: 2rem 1rem; border-radius: 15px; text-align: center; margin: 3rem auto; border: 1px solid #333; max-width: 800px; }
    .payment-icons { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; margin-top: 15px; }

    /* Comentários */
    .comment-box { background: rgba(10, 10, 10, 0.8); padding: 2rem; border-radius: 15px; border-top: 2px solid var(--primary); margin: 2rem auto; max-width: 800px; }
    .comment-item { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--primary); text-align: left; }

    /* Modal */
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; }
    #qr-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 2px solid var(--primary); padding: 25px; border-radius: 20px; z-index: 10000; text-align: center; width: 90%; max-width: 350px; }
  </style>
</head>
<body>

<div class="tv-frame"></div>
<div class="tv-on-flash" id="flash"></div>

<div id="tv-screen">
  <button class="power-btn" onclick="ligarTV()">
    <svg viewBox="0 0 24 24"><path d="M16.56,5.44L15.11,6.89C16.84,7.94 18,9.83 18,12A6,6 0 0,1 12,18A6,6 0 0,1 6,12C6,9.83 7.16,7.94 8.88,6.88L7.44,5.44C5.36,6.88 4,9.28 4,12A8,8 0 0,0 12,20A8,8 0 0,0 20,12C20,9.28 18.64,6.88 16.56,5.44M13,3H11V13H13V3Z" /></svg>
  </button>
  <div style="margin-top:20px; color:#444; font-weight:bold; letter-spacing: 2px;">LIGAR MASTER NET</div>
</div>

<div id="main-content">
  <header><h1>MASTER NET IPTV 🚀</h1></header>

  <div class="streaming-container">
    <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix">
    <img src="https://upload.wikimedia.org/wikipedia/commons/1/11/Prime_Video_logo.svg" alt="Prime Video">
    <img src="https://upload.wikimedia.org/wikipedia/commons/c/ce/HBO_Max_Logo.svg" alt="HBO Max">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Disney%2B_logo.svg" alt="Disney+">
    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d5/Paramount_Plus_logo.svg" alt="Paramount+">
    <img src="https://upload.wikimedia.org/wikipedia/commons/d/dd/Crunchyroll_Logo.svg" alt="Crunchyroll">
  </div>

  <section class="products">
    <div class="product">
      <b>PLANO MENSAL</b><div class="price">R$ 35,00</div>
      <button class="btn-pix" onclick="gerarPix('35.00')">PAGAR PIX</button>
      <a href="https://wa.me/5519996804873?text=Paguei 35" class="btn-paid">JÁ PAGUEI ✅</a>
    </div>
    <div class="product">
      <b>PLANO BIMESTRAL</b><div class="price">R$ 60,00</div>
      <button class="btn-pix" onclick="gerarPix('60.00')">PAGAR PIX</button>
      <a href="https://wa.me/5519996804873?text=Paguei 60" class="btn-paid">JÁ PAGUEI ✅</a>
    </div>
    <div class="product">
      <b>PLANO QUADRIMESTRAL</b><div class="price">R$ 100,00</div>
      <button class="btn-pix" onclick="gerarPix('100.00')">PAGAR PIX</button>
      <a href="https://wa.me/5519996804873?text=Paguei 100" class="btn-paid">JÁ PAGUEI ✅</a>
    </div>

    <div class="product test-card">
      <b style="color: var(--secondary);">TESTE GRÁTIS 2H</b>
      <div class="price" style="color: var(--secondary);">R$ 0,00</div>
      <button class="btn-pix" style="background: var(--secondary);" onclick="enviarTeste()">QUERO MEU TESTE</button>
      <input type="text" id="device-name" class="device-input" placeholder="Ex: Smart TV Samsung">
    </div>
  </section>

  <section class="payments">
    <h2 style="font-size: 1.2rem;">FORMAS DE PAGAMENTO</h2>
    <div class="payment-icons">
      <div style="display:flex; flex-direction:column; align-items:center; gap:5px;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a2/Logo%E2%80%94Pix.svg" width="60">
        <span style="font-size:10px;">PIX</span>
      </div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:5px;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" width="60">
        <span style="font-size:10px;">CARTÃO</span>
      </div>
    </div>
  </section>

  <section class="comment-box">
    <h2 style="text-align: center; font-size: 1.2rem;">💬 O QUE DIZEM NOSSOS CLIENTES</h2>
    <div id="feedback-list"></div>
    <div id="auth-section" style="text-align:center; margin-top: 15px;">
      <button class="btn-pix" style="width:auto; padding:10px 30px;" onclick="loginGoogle()">🔐 Login para Comentar</button>
    </div>
    <div id="comment-area" style="display:none; margin-top:15px; text-align: center;">
      <textarea id="comment-input" style="width:100%; height:60px; background:#111; color:#fff; border:1px solid #333; border-radius:8px; padding:10px;" placeholder="Deixe sua avaliação..."></textarea>
      <button class="btn-pix" onclick="sendComment()" style="margin-top:10px; width:auto; padding:10px 40px;">PUBLICAR</button>
    </div>
  </section>
</div>

<div class="overlay" onclick="closeQR()"></div>
<div id="qr-modal">
  <h3 style="color:var(--primary); margin-top:0;">Pagamento PIX</h3>
  <img id="qr-img" src="" style="width:200px; background:#fff; padding:10px; border-radius:10px;">
  <textarea id="pix-code" readonly style="width:100%; height:50px; background:#000; color:#0f0; border:1px solid #333; font-size:10px; margin-top:10px;"></textarea>
  <button class="btn-pix" style="background:var(--secondary); margin-top:10px;" onclick="copyPix()">COPIAR CÓDIGO</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDkzu7El2JNbQA7kflKjNX8DdsAibG7uGU",
  authDomain: "site-467da.firebaseapp.com",
  databaseURL: "https://site-467da-default-rtdb.firebaseio.com",
  projectId: "site-467da",
  storageBucket: "site-467da.firebasestorage.app",
  appId: "1:749496526421:web:53d7d52bfcdc04b0be96dc"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

function ligarTV() {
  const flash = document.getElementById('flash');
  flash.style.display = 'block';
  flash.style.animation = 'turn-on 0.6s ease-out forwards';
  setTimeout(() => {
    document.getElementById('tv-screen').style.display = 'none';
    flash.style.display = 'none';
    document.getElementById('main-content').style.opacity = '1';
    document.body.style.overflow = 'auto';
  }, 650);
}

function loginGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
auth.onAuthStateChanged(user => {
  document.getElementById('auth-section').style.display = user ? 'none' : 'block';
  document.getElementById('comment-area').style.display = user ? 'block' : 'none';
  renderComments();
});

function sendComment() {
  const text = document.getElementById('comment-input').value;
  if(text.trim() && auth.currentUser) {
    db.ref('comments').push({ name: auth.currentUser.displayName, text: text });
    document.getElementById('comment-input').value = '';
  }
}

function renderComments() {
  db.ref('comments').on('value', snap => {
    const list = document.getElementById('feedback-list'); list.innerHTML = "";
    snap.forEach(child => {
      const c = child.val();
      const div = document.createElement('div'); div.className = 'comment-item';
      div.innerHTML = `<strong>${c.name}</strong><p style="margin:5px 0; font-size: 14px;">${c.text}</p>`;
      list.prepend(div);
    });
  });
}

function gerarPix(v) {
    const p = "00020126360014BR.GOV.BCB.PIX011315a458f7-cb18-4179-a454-33eeadca9dca520400005303986540"+v.length+v+"5802BR5910MASTER NET6009SAO PAULO62070503***6304";
    document.getElementById('pix-code').value = p;
    document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(p)}`;
    document.querySelector('.overlay').style.display = 'block';
    document.getElementById('qr-modal').style.display = 'block';
}

function closeQR() { document.querySelector('.overlay').style.display = 'none'; document.getElementById('qr-modal').style.display = 'none'; }
function copyPix() { document.getElementById("pix-code").select(); document.execCommand("copy"); alert("Código Copiado!"); }

function enviarTeste() {
    const d = document.getElementById('device-name').value;
    if (!d.trim()) return alert("Digite o seu dispositivo!");
    window.open(`https://wa.me/5519996804873?text=Olá, quero um teste grátis para o dispositivo: ${d}`, '_blank');
}
</script>
</body>
</html>
