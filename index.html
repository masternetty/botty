<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MASTER NET - IPTV</title>
  <link rel="icon" href="logo.png" type="image/png">
  <style>
    body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #000; color: #fff; overflow-x: hidden; }
    header { text-align: center; padding: 2rem 1rem; }
    section { padding: 1rem 1rem; max-width: 900px; margin: 0 auto; }
    h1, h2 { color: #e60000; text-transform: uppercase; }
    .products { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; }
    .product { background: rgba(20,20,20,0.9); border: 2px solid #e60000; padding: 1.5rem; width: 280px; border-radius: 12px; text-align: center; box-shadow: 0 4px 15px rgba(230,0,0,0.3); }
    
    /* Botão de PIX */
    .btn-pix { display: inline-block; margin-top: 1rem; padding: 0.8rem; background-color: #e60000; color: #fff; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; width: 100%; font-size: 1rem; }
    .btn-pix:hover { background-color: #ff1a1a; transform: scale(1.02); }
    .btn-link { display: block; margin-top: 10px; color: #888; text-decoration: none; font-size: 0.8rem; }

    /* Modal do QR Code */
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; backdrop-filter: blur(5px); }
    #qr-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 2px solid #e60000; padding: 25px; border-radius: 20px; z-index: 10000; text-align: center; width: 90%; max-width: 350px; }
    #qr-img { width: 220px; height: 220px; background: #fff; padding: 10px; border-radius: 10px; margin: 15px auto; display: block; }
    #pix-code { width: 100%; height: 80px; background: #000; color: #00ff00; border: 1px solid #444; padding: 10px; font-size: 0.75rem; font-family: monospace; resize: none; border-radius: 8px; word-break: break-all; margin-bottom: 15px; }
    
    .btn-copy { background: #00b300; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .btn-close { background: #333; color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; margin-top: 8px; }

    .feedbacks { background-color: rgba(10,10,10,0.9); padding: 2rem 1rem; border-top: 1px solid #e60000; }
    .feedback { background: #222; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; border-left: 4px solid #e60000; }
    .popup-btn { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 9999; }
    .popup-btn a { background-color: #25d366; color: white; text-decoration: none; padding: 15px 25px; border-radius: 50px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
  </style>
</head>
<body>

<header>
  <img src="logo.png" alt="MASTER NET Logo" style="height: 100px; margin-bottom: 1rem;">
  <h1>MASTER NET IPTV</h1>
  <p>Escolha seu plano e gere o PIX na hora!</p>
</header>

<section>
  <div class="products">
    <div class="product">
      <p><b>Teste de Acesso</b></p>
      <p style="font-size: 1.5rem; font-weight: 800; color: #e60000;">R$ 0,10</p>
      <button class="btn-pix" onclick="gerarPix('0.10', 'TESTE')">GERAR PIX</button>
      <a href="https://mpago.la/22V7wWL" target="_blank" class="btn-link">Pagar via Cartão</a>
    </div>

    <div class="product">
      <p><b>Plano 1 Mês</b></p>
      <p style="font-size: 1.5rem; font-weight: 800; color: #e60000;">R$ 35,00</p>
      <button class="btn-pix" onclick="gerarPix('35.00', '1MES')">GERAR PIX</button>
      <a href="https://mpago.la/2Y94v1R" target="_blank" class="btn-link">Pagar via Cartão</a>
    </div>

    <div class="product">
      <p><b>Plano 2 Meses</b></p>
      <p style="font-size: 1.5rem; font-weight: 800; color: #e60000;">R$ 60,00</p>
      <button class="btn-pix" onclick="gerarPix('60.00', '2MESES')">GERAR PIX</button>
      <a href="https://mpago.la/2ZHZtoj" target="_blank" class="btn-link">Pagar via Cartão</a>
    </div>

    <div class="product">
      <p><b>Plano 4 Meses</b></p>
      <p style="font-size: 1.5rem; font-weight: 800; color: #e60000;">R$ 100,00</p>
      <button class="btn-pix" onclick="gerarPix('100.00', '4MESES')">GERAR PIX</button>
      <a href="https://mpago.la/28h8M7b" target="_blank" class="btn-link">Pagar via Cartão</a>
    </div>
  </div>
</section>

<div class="overlay" onclick="closeQR()"></div>
<div id="qr-modal">
  <h3 id="modal-titulo" style="margin: 0; color: #e60000;">Pagamento PIX</h3>
  <img id="qr-img" src="" alt="Gerando QR Code...">
  <p style="font-size: 0.8rem; color: #bbb; margin-bottom: 5px;">Código Copia e Cola:</p>
  <textarea id="pix-code" readonly></textarea>
  <button class="btn-copy" onclick="copyPix()">COPIAR CÓDIGO</button>
  <button class="btn-close" onclick="closeQR()">CANCELAR</button>
</div>

<section class="feedbacks">
  <h2>💬 Comentários</h2>
  <div id="login-section"><button id="login-btn" style="background:#e60000; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">🔐 Login com Google para comentar</button></div>
  <div id="comment-section" style="display:none;">
    <div id="feedback-list"></div>
    <form id="comment-form">
      <input type="text" id="name" placeholder="Seu nome" readonly style="width:100%; margin-bottom:5px; padding:8px; background: #333; color: #fff; border: none;">
      <textarea id="message" placeholder="Seu comentário" required style="width:100%; height:60px; margin-bottom:5px; padding:8px; background: #333; color: #fff; border: none;"></textarea>
      <button type="submit" style="background:#e60000; color:white; border:none; padding:10px; cursor:pointer; border-radius:5px; width:100%;">Enviar Comentário</button>
    </form>
  </div>
</section>

<div class="popup-btn">
  <a href="https://wa.me/5519996804873" target="_blank">💬 WhatsApp</a>
</div>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>

<script>
// --- CONFIGURAÇÃO PIX ---
const CHAVE_PIX = "15a458f7-cb18-4179-a454-33eeadca9dca";
const NOME_RECEBEDOR = "MASTER NET";
const CIDADE_RECEBEDOR = "SAO PAULO";

// Função CRC16 CCITT (Essencial para o banco aceitar o PIX)
function calcularCRC16(payload) {
    let crc = 0xFFFF;
    const polynomial = 0x1021;
    for (let i = 0; i < payload.length; i++) {
        let b = payload.charCodeAt(i);
        for (let j = 0; j < 8; j++) {
            let bit = ((b >> (7 - j) & 1) === 1);
            let c15 = ((crc >> 15 & 1) === 1);
            crc <<= 1;
            if (c15 ^ bit) crc ^= polynomial;
        }
    }
    return (crc & 0xFFFF).toString(16).toUpperCase().padStart(4, '0');
}

function gerarPix(valor, idTransacao) {
    const v = parseFloat(valor).toFixed(2);
    const f = (id, conteudo) => id + conteudo.length.toString().padStart(2, '0') + conteudo;

    const infoConta = f('00', 'BR.GOV.BCB.PIX') + f('01', CHAVE_PIX);
    
    let payload = "000201";
    payload += f('26', infoConta);
    payload += "52040000";
    payload += "5303986";
    payload += f('54', v);
    payload += "5802BR";
    payload += f('59', NOME_RECEBEDOR);
    payload += f('60', CIDADE_RECEBEDOR);
    payload += f('62', f('05', idTransacao));
    payload += "6304";

    const pixCompleto = payload + calcularCRC16(payload);
    
    document.getElementById('modal-titulo').innerText = "Plano " + valor;
    document.getElementById('pix-code').value = pixCompleto;
    document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(pixCompleto)}`;
    
    document.querySelector('.overlay').style.display = 'block';
    document.getElementById('qr-modal').style.display = 'block';
}

function closeQR() {
    document.querySelector('.overlay').style.display = 'none';
    document.getElementById('qr-modal').style.display = 'none';
}

function copyPix() {
    const el = document.getElementById("pix-code");
    el.select();
    navigator.clipboard.writeText(el.value);
    alert("Código copiado! Use o PIX COPIA E COLA no seu banco.");
}

// --- FIREBASE ---
const firebaseConfig = {
  apiKey: "AIzaSyDkzu7El2JNbQA7kflKjNX8DdsAibG7uGU",
  authDomain: "site-467da.firebaseapp.com",
  databaseURL: "https://site-467da-default-rtdb.firebaseio.com",
  projectId: "site-467da",
  storageBucket: "site-467da.appspot.com",
  messagingSenderId: "749496526421",
  appId: "1:749496526421:web:53d7d52bfcdc04b0be96dc"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const database = firebase.database();

document.getElementById('login-btn').onclick = () => {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
};

auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById('login-section').style.display = "none";
    document.getElementById('comment-section').style.display = "block";
    document.getElementById('name').value = user.displayName;
  }
});

document.getElementById('comment-form').onsubmit = e => {
  e.preventDefault();
  const name = document.getElementById('name').value;
  const message = document.getElementById('message').value;
  database.ref("feedbacks").push({ name, message, timestamp: Date.now() });
  document.getElementById('message').value = "";
};

database.ref("feedbacks").on("child_added", snapshot => {
  const feedback = snapshot.val();
  const div = document.createElement("div");
  div.className = "feedback";
  div.innerHTML = `<strong>${feedback.name}:</strong> ${feedback.message}`;
  document.getElementById("feedback-list").prepend(div);
});
</script>

</body>
</html>
